services:
  api:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./weights:/app/weights  # Mount model weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
